{% set name = "zasper" %}
{% set version = "0.2.0b0" %}
{% set tag = "v0.2.0-beta" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/zasper-io/zasper/archive/refs/tags/{{ tag }}.tar.gz
  sha256: a5731242428ac92ac57d04a63ade9267e71327c61fbc8e8b58e2821f93ca1768


build:
  number: 0
  script:
    - go-licenses save . --save_path=license-files --ignore github.com/zasper-io/zasper
    - make init
    - make build
    - install -m755 zasper "$PREFIX/bin/zasper"  # [not win]
    - copy /Y zasper.exe %PREFIX%\bin\zasper.exe  # [win]
    # Clear out cache to avoid file not removable warnings
    - chmod -R u+w $(go env GOPATH) && rm -r $(go env GOPATH)  # [unix]


requirements:
  build:
    - go >=1.21
    - nodejs >=18
    - make
    - go-licenses
  run:
    - python
    - ipykernel

test:
  commands:
    - zasper --help

about:
  home: https://github.com/zasper-io/zasper
  license: AGPL-3.0-only
  license_file:
    - LICENSE
    - license-files/
  summary: "Zasper: High Performance IDE for Jupyter Notebooks"
  dev_url: https://github.com/zasper-io/zasper
  doc_url: https://zasper.io/docs

extra:
  recipe-maintainers:
    - prasunanand
